<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./images/TheFavicon.png">
  <link rel="stylesheet" href="styles.css" />
  <title>Tribūtum Trōnis</title>
</head>
<body>
  <div class="scene">
    <div class="stars layer1"></div>
    <div class="stars layer2"></div>
    <div class="stars layer3"></div>
    <div class="horizon-glow"></div>
    <div class="grid"></div>
    <div class="lightcycle"></div>
    <div class="lightcycle delay"></div>
    <div class="hud">
      <div class="hud-ring"></div>
      <div class="hud-scan"></div>
      <div class="hud-text">SYSTEM ONLINE</div>
    </div>
    <div class="camera">
      <div class="disk-wrapper">
        <div class="title">
          Tribūtum Trōnis
          <span>The Dubsar Systema</span>
        </div>
        <div class="disk">
          <div class="circuit"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
